# Static marketing site (Astro, output: static). No API/GraphQL proxy — the
# vitrine talks to no backend; the live demo links out to a running instance.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml application/manifest+json;

    # Hashed, immutable build assets (Astro emits them under /_astro/).
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Pages: serve the file, its directory index, or the .html variant.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Astro builds a real 404 page.
    error_page 404 /404.html;
}
