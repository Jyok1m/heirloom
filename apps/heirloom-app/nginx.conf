# SPA + reverse proxy to the API. "api" resolves to the API service on the
# Docker network (adjust the upstream host/port to your compose service name).
upstream heirloom_api {
    server api:3000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache hashed static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST API
    location /api/ {
        proxy_pass http://heirloom_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Assistant streams Server-Sent Events: don't buffer, keep it alive
        proxy_buffering off;
        proxy_read_timeout 3600s;
        client_max_body_size 100m;
    }

    # GraphQL
    location /graphql {
        proxy_pass http://heirloom_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
