services:
  db:
    image: postgres:18.4-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heirloom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-heirloom}
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - db_network
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heirloom}"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:5.5.0
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DEFAULT_DB: ${POSTGRES_DB:-heirloom}
      ADMINER_DEFAULT_USERNAME: ${POSTGRES_USER:-heirloom}
      ADMINER_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./docker/adminer/prefill-login.php:/var/www/html/plugins-enabled/prefill-login.php:ro
    networks:
      - db_network
    depends_on:
      db:
        condition: service_healthy

  # Opt-in (docker compose --profile llm up -d): on macOS, Docker has no GPU
  # access — run Ollama natively instead (brew install ollama). This service
  # targets Linux hosts / production self-hosting.
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    profiles: ["llm"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama:/root/.ollama

networks:
  db_network:

volumes:
  db_data:
  ollama:
